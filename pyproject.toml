[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "nzwihl-broadcast-rosters"
version = "0.1.0"
description = "Auto-generated NZWIHL roster sheets for broadcast booth use."
requires-python = ">=3.10"
dependencies = [
    "requests>=2.31",
    "reportlab>=4.0",
]

[tool.setuptools.packages.find]
where = ["src"]
